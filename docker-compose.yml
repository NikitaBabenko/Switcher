services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: switcher
      POSTGRES_USER: switcher
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-switcher}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U switcher -d switcher"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      ConnectionStrings__Default: Host=postgres;Database=switcher;Username=switcher;Password=${POSTGRES_PASSWORD:-switcher}
      Bot__Token: ${BOT_TOKEN:-}
      Bot__WebhookBaseUrl: ${BOT_WEBHOOK_BASE_URL:-}
      Bot__WebhookSecret: ${BOT_WEBHOOK_SECRET:-}
      Bot__AppUrl: ${BOT_APP_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
