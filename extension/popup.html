<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>VibeNest Switcher</title>
    <style>
      body { font-family: -apple-system, "Segoe UI", sans-serif; margin: 0; padding: 12px; width: 340px; }
      textarea { width: 100%; height: 100px; box-sizing: border-box; font-family: inherit; font-size: 14px; }
      .row { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
      button { padding: 6px 12px; cursor: pointer; }
      button.primary { background: #2563eb; color: #fff; border: 1px solid #1d4ed8; border-radius: 6px; }
      button.primary:disabled { background: #9ca3af; border-color: #9ca3af; cursor: default; }
      select { padding: 4px 6px; font-family: inherit; }
      .result-wrap { position: relative; margin-top: 8px; }
      .result { padding: 8px; padding-right: 64px; background: #f3f4f6; border-radius: 6px; font-size: 14px; min-height: 40px; white-space: pre-wrap; word-wrap: break-word; }
      .result-copy { position: absolute; top: 6px; right: 6px; padding: 2px 8px; font-size: 11px; line-height: 1.6; background: #fff; border: 1px solid #d1d5db; border-radius: 4px; cursor: pointer; opacity: 0.85; }
      .result-copy:hover:not(:disabled) { opacity: 1; background: #e5e7eb; }
      .result-copy:disabled { cursor: default; opacity: 0.4; background: #f3f4f6; color: #9ca3af; }
      .muted { color: #6b7280; font-size: 12px; }
      .section { padding: 8px 0; }
      .divider { height: 1px; background: #e5e7eb; margin: 10px 0; }
      a { color: #2563eb; }
      .banner { margin: -12px -12px 10px; padding: 6px 12px; background: #2563eb; color: #fff; font-size: 12px; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
      .banner .brand { font-weight: 600; }
      .banner a { color: #fff; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.4); }
      .banner a:hover { border-bottom-color: #fff; }
      label.inline { display: flex; align-items: center; gap: 6px; }
      .shortcut-hint { margin-top: 8px; font-size: 11px; }
      .shortcut-hint kbd {
        background: #fff;
        border: 1px solid #d1d5db;
        border-bottom-width: 2px;
        border-radius: 3px;
        padding: 1px 5px;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 10.5px;
        color: #111827;
      }
      .privacy {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        font-size: 11px;
        color: #4b5563;
      }
      .privacy a {
        color: #2563eb;
        text-decoration: none;
        border-bottom: 1px dashed #93c5fd;
      }
      .privacy a:hover { border-bottom-style: solid; }
      .ui-locale { font-size: 11px; padding: 2px 4px; max-width: 110px; }
    </style>
  </head>
  <body>
    <div class="banner">
      <span class="brand">VibeNest Switcher</span>
      <span>
        <a href="https://vibenest.net" target="_blank">vibenest.net</a> ·
        <a href="https://t.me/SynthCabalBot" target="_blank">@SynthCabalBot</a>
      </span>
    </div>

    <div class="section">
      <div class="row">
        <label class="inline" for="adapter-override"><span class="muted" data-i18n="popup_siteLabel">Site</span></label>
        <select id="adapter-override">
          <option value="auto" data-i18n="siteAdapter_auto">Auto</option>
          <option value="twitter">Twitter / X</option>
          <option value="facebook">Facebook</option>
          <option value="messenger">Messenger</option>
          <option value="vk">VK (feed)</option>
          <option value="vk-im">VK Messages</option>
          <option value="instagram">Instagram</option>
          <option value="telegram">Telegram Web</option>
          <option value="whatsapp">WhatsApp Web</option>
          <option value="discord">Discord</option>
          <option value="slack">Slack</option>
          <option value="reddit">Reddit</option>
          <option value="linkedin">LinkedIn</option>
          <option value="twitch">Twitch</option>
          <option value="mastodon">Mastodon</option>
          <option value="generic" data-i18n="siteAdapter_generic">Other / generic</option>
        </select>
      </div>
      <div class="muted" id="detected" style="margin-top:4px"></div>
      <div class="row">
        <button id="decrypt-page" class="primary" data-i18n="popup_decryptFocused">Decrypt focused field</button>
        <button id="undo" disabled data-i18n="popup_undo" data-i18n-title="popup_undoTitle">Undo</button>
      </div>
      <div class="muted shortcut-hint">
        <span data-i18n="popup_shortcutHintBefore">Tip: focus a field and press</span>
        <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>L</kbd>
        <span data-i18n="popup_shortcutHintAfter">for the same thing.</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section">
      <div class="muted" data-i18n="popup_pasteHeader" style="margin-bottom:4px">Or paste text and decrypt:</div>
      <textarea id="input" data-i18n-placeholder="popup_pastePlaceholder" placeholder="Paste cyrillic gibberish here…"></textarea>
      <div class="row">
        <button id="convert" data-i18n="popup_decrypt">Decrypt</button>
        <select id="uiLocale" class="ui-locale" data-i18n-title="popup_languageLabel" data-i18n-aria-label="popup_languageLabel" style="margin-left:auto"></select>
        <a href="#" id="open-options" data-i18n="popup_settingsLink">Settings</a>
      </div>
      <div class="muted" id="info"></div>
      <div class="result-wrap">
        <div class="result" id="result"></div>
        <button id="copy" class="result-copy" type="button" disabled data-i18n="popup_copy">Copy</button>
      </div>
    </div>

    <div class="divider"></div>
    <div class="privacy">
      <span data-i18n="popup_privacyNote">🔒 Runs entirely in your browser. No text leaves your device.</span>
      <a href="https://github.com/NikitaBabenko/Switcher" target="_blank" rel="noopener noreferrer" data-i18n="popup_sourceOnGitHub">Source on GitHub</a>
    </div>

    <script src="popup.js" type="module"></script>
  </body>
</html>
