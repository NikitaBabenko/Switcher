<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>VibeNest Switcher</title>
    <style>
      body { font-family: -apple-system, "Segoe UI", sans-serif; margin: 0; padding: 12px; width: 320px; }
      textarea { width: 100%; height: 100px; box-sizing: border-box; font-family: inherit; font-size: 14px; }
      .row { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
      button { padding: 6px 12px; cursor: pointer; }
      .result { margin-top: 8px; padding: 8px; background: #f3f4f6; border-radius: 6px; font-size: 14px; min-height: 40px; white-space: pre-wrap; word-wrap: break-word; }
      .muted { color: #6b7280; font-size: 12px; }
      a { color: #2563eb; }
      .banner { margin: -12px -12px 10px; padding: 6px 12px; background: #2563eb; color: #fff; font-size: 12px; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
      .banner .brand { font-weight: 600; }
      .banner a { color: #fff; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.4); }
      .banner a:hover { border-bottom-color: #fff; }
    </style>
  </head>
  <body>
    <div class="banner">
      <span class="brand">VibeNest Switcher</span>
      <span>
        <a href="https://vibenest.net" target="_blank">vibenest.net</a> ·
        <a href="https://t.me/SynthCabalBot" target="_blank">@SynthCabalBot</a>
      </span>
    </div>
    <textarea id="input" placeholder="Текст..."></textarea>
    <div class="row">
      <button id="convert">Переключить</button>
      <button id="copy" disabled>Скопировать</button>
      <a href="#" id="open-options" style="margin-left:auto">Настройки</a>
    </div>
    <div class="muted" id="info"></div>
    <div class="result" id="result"></div>
    <script src="popup.js" type="module"></script>
  </body>
</html>
